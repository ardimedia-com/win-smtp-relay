name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'docs/**'
      - '.config/dotnet-tools.json'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Required for deploying to GitHub Pages from Actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent Pages deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # windows-latest matches the release CI and avoids cross-platform restore surprises (the solution
    # also contains a net10.0-windows host and a WiX installer project). DocFX only reads the net10.0
    # library projects listed in docs/docfx.json.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'

      # DocFX needs the project references resolved before extracting API metadata.
      - name: Restore
        run: dotnet restore winsmtprelay.slnx

      - name: Restore tools
        run: dotnet tool restore

      - name: Build documentation site
        run: dotnet docfx docs/docfx.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
